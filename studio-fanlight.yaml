substitutions:
  # https://esphome.io/guides/configuration-types.html#substitutions
  dev_name: "studio-fanlight"                  # hostname & entity_id
  dev_friendly_name: "Studio Ceiling"     # Displayed in HA frontend
  dev_use_address: "${dev_name}.local"

esphome:
  name: $dev_name
  friendly_name: ${dev_friendly_name}
#  build_path: "../config/esphome/${name}_build"
  on_boot:
    priority: -100
    then:
      - delay: 10s
      - lambda: |-
          ESP_LOGI("boot", "on_boot triggered");
      - delay: 1s
      - number.set:
          id: light_min_brightness
          value: 10
      - lambda: |-
          ESP_LOGI("boot", "on_boot finished");

bk72xx:
  board: cb3s

# Disable logging via the UART
logger:
  baud_rate: 0
  
uart:
  rx_pin: 10
  tx_pin: 11
  baud_rate: 115200

time:
  - platform: homeassistant
    id: homeassistant_time

# [tuya:041]: Tuya:
# [tuya:056]:   Datapoint 101: switch (value: OFF)    # light switch
# [tuya:056]:   Datapoint 1: switch (value: OFF)      # fan switch
# [tuya:062]:   Datapoint 3: enum (value: 3)          # fan speed
# [tuya:058]:   Datapoint 105: int value (value: 100) # light min brightness
# [tuya:062]:   Datapoint 106: enum (value: 0)        # unknown
# [tuya:058]:   Datapoint 108: int value (value: 1)   # unknown  
# [tuya:058]:   Datapoint 6: int value (value: 1000)  # light dimmer
# [tuya:054]:   Datapoint 107: raw (value: 00.00)     # unknown
# [tuya:054]:   Datapoint 109: raw (value: 06.00.00.00) # unknown
# [tuya:074]:   Product: '{"p":"ea88zei7auxu48s6","v":"4.0.8","m":0}'

tuya:
  time_id: homeassistant_time
  id: tuya_mcu

light:
  - platform: tuya
    name: "Light"
    switch_datapoint: 101
    dimmer_datapoint: 6
    min_value: 10
    max_value: 1000
    
number:
  - platform: tuya
    id: light_min_brightness
    name: "Light Min Brightness"
    number_datapoint: 105
    step: 1
    min_value: 10
    max_value: 1000
    internal: true

fan:
  - platform: tuya
    name: "Fan"
    switch_datapoint: 1
    speed_datapoint: 3
    speed_count: 4

switch:
  # https://esphome.io/components/switch/restart.html
  - platform: restart
    #name: "${dev_friendly_name} Reboot ESP"
    name: "Reboot"
    icon: mdi:restart
    disabled_by_default: true
    entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 120s

  - platform: uptime
    name: Uptime

wifi:
  # https://esphome.io/components/wifi
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  #min_auth_mode: WPA2
  use_address: "${dev_use_address}"
  # fast_connect: true
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${dev_name} Fallback Hotspot"
    password: !secret wifi_fallback_ap_password

captive_portal:
  # no configuration needed
  # https://esphome.io/components/captive_portal.html

ota:
  - platform: esphome
    # password: !secret ota_password
# # To remove ota password...
    # password: "c3b63e293c67552afd8603a52199306e"
    # id: ota_id

# Enable Web server.
web_server:
  port: 80
  version: 1
#  auth:
#    username: !secret web_server_username
#    password: !secret web_server_password

api:

