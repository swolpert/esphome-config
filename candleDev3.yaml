#
#  Trick #1 - dynamic sleep duration
#  
#  Since startup, wifi, sensor, and HA sync take anywhere from 2 seconds to 12.
#  So to achieve a 60s or 600s loop we dynamically adjust how long to sleep
#
globals:
  # - id: delay_int
    # type: int
    # restore_value: no
    # initial_value: '99999'

  - id: mqtt_done_switch
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: mqtt_done_sleep_interval
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: latest_light_state
    type: std::string
    restore_value: no
    initial_value: '"none"'
    
  - id: sleep_interval
    type: std::string
    restore_value: no
    initial_value: '"none"'

esphome:
  name: ${dev_name}
  friendly_name: ${dev_friendly_name}
  
  on_boot:
    - priority: 600
      then: 
        - output.turn_on: debug_gpio
        - logger.log: "debug_gpio turned ON"
        # - deep_sleep.prevent: deep_sleep1

    - priority: -101
      then:
        - logger.log: "on_boot: consider_deep_sleep..."
        - script.execute: consider_deep_sleep

