                            # then:
                            # - lambda: |
                                                                # id(delay_int) = 600;
                            # - logger.log: 'Delay set to 10 min (600)'
                            # else:                  
                              # - if:
                                  # # path 3c - okauy to loop, set interval to 60min
                                  # condition: 
                                    # lambda: return  strcmp("60min", id(candle_sleep_interval).state.c_str()) == 0;
                                  # then:
                                  # - lambda: |
                                                                      # id(delay_int) = 3600;
                                  # - logger.log: 'Delay set to 60 min (3600)'
                    # # path 3 (a&b) - compensate for wifi/HA delays by reducing interval to next even minute/10minute
