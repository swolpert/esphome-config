---

#
#  Trick #1 - dynamic sleep duration
#  
#  Since startup, wifi, sensor, and HA sync take anywhere from 2 seconds to 12.
#  So to achieve a 60s or 600s loop we dynamically adjust how long to sleep
#
globals:
  - id: delay_int
    type: int
    restore_value: no
    initial_value: '60'
    
# we can rely on HA time since we only use it after sensor succesfully publishes (successfully talked to HA)
time:
  - platform: homeassistant
    id: homeassistant_time

esphome:
  name: ${dev_name}
  friendly_name: ${dev_friendly_name}
# # To remove ota password...
# # Must put password in .base.yaml ota: section
  # on_boot:
    # - lambda: |-
        # id(ota_id).set_auth_password("");

esp32:
  board: dfrobot_beetle_esp32c3
  variant: esp32c3
  framework:
    type: arduino

binary_sensor:
  - platform: homeassistant
    id: candles_on_off
    name: Candles OnOff
    entity_id: input_boolean.candles_on_off
    on_state:
      - lambda: |-
          // Within lambda, get the binary sensor state and conditionally do something
          if (id(candles_on_off).state) {
            // Binary sensor is ON, do something here
            id(switch1).turn_on();
            ESP_LOGD("binary_sensor", "id(switch1).turn_on();");
          } else {
            // Binary sensor is OFF, do something else here
            id(switch1).turn_off();
            ESP_LOGD("binary_sensor", "id(switch1).turn_off();");
          }
      - logger.log: 'candles_on_off: TURN ON candle'

  - platform: status
    #name: "${dev_friendly_name} Connectivity"
    name: "Connectivity"
    disabled_by_default: true
    entity_category: diagnostic

  - platform: gpio
    id: button_id
    # name: BOOT0 Button
    internal: true
    filters:
      - delayed_on: 10ms
    pin:
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: false
    on_press:
      then:
        - logger.log: "Button BOOT0 pressed"
        - switch.toggle: switch1

# interval:
#   - interval: 10s
#     then:
#       - light.toggle: blue_led_pulse

light:
# # for PWM status led:
#   - platform: status_led
#     id: blue_status_led
#     output: blue_led_pwm
  - platform: monochromatic
    output: blue_led_pwm
    id: blue_led_light
    name: "Blue LED"
    restore_mode: ALWAYS_ON
    effects:
      - pulse:
      - pulse:
          name: "Custom Pulse"
          transition_length: 1.5s
          update_interval: 1.5s
          min_brightness: 10%
          max_brightness: 85%

      # - pulse:
      #     name: "Slow Pulse"
      #     transition_length: 500ms
      #     update_interval: 2s
      # - pulse:
      #     name: "Asymmetrical Pulse"
      #     transition_length:
      #       on_length: 1s
      #       off_length: 500ms
      #     update_interval: 1.5s
    on_turn_on:
      then:
        - light.turn_on:
            id: blue_led_light
            effect: "Custom Pulse"

  # - platform: esp32_rmt_led_strip
    # id: rgbw_led2
    # name: "Candle2"
    # icon: mdi:candle
    # chipset: sk6812
    # pin: GPIO20 # GPIO21
    # rgb_order: GRB
    # is_rgbw: true
    # rmt_channel: 0
    # num_leds: 1
    # restore_mode: RESTORE_DEFAULT_OFF
    # effects:
      # - flicker:
      # - flicker:
          # name: "Custom Flicker"
          # alpha: 95%
          # intensity: 5%

  - platform: neopixelbus
    id: rgbw_led
    name: "Candle"
    icon: mdi:candle
    type: GRBW
    variant: SK6812
    pin: GPIO21
    num_leds: 1
    restore_mode: ALWAYS_OFF
    # color_correct: [100%, 100%, 100%, 100%]
    # color_correct: [1%, 0%, 0%, 10%]
    effects:
      - flicker:
      - flicker:
          name: "Custom Flicker"
          alpha: 95%
          intensity: 5%
          # update_interval: 250ms

# for PWM status led:
output:
  - platform: ledc
    id: blue_led_pwm
    pin: GPIO8
    inverted: true
    min_power: 0%
    max_power: 100%

switch:
    # https://esphome.io/components/switch/restart.html
  - platform: restart
    #name: "${dev_friendly_name} Reboot ESP"
    name: "Reboot ESP"
    icon: mdi:restart
    disabled_by_default: true
    entity_category: diagnostic

  - platform: template
    id: switch1
    optimistic: true
    internal: true
    turn_on_action:
      - light.turn_on:
          id: rgbw_led
          color_mode: RGB_WHITE
          brightness: 100%
          red: 100%
          green: 50%
          blue: 0%
          white: 70%
          # effect: "Custom Flicker"
    turn_off_action:
      - light.turn_off:
          id: rgbw_led
    restore_mode: RESTORE_DEFAULT_OFF

  # - platform: gpio
  #   #name: "${dev_friendly_name} Switch"
  #   name: "Blue LED"
  #   pin:
  #     number: GPIO8
  #     inverted: true
  #   id: switch1
