  #   icon: ${dev_icon}
  #   turn_on_action:
  #     - light.turn_on: blue_status_led
  #   turn_off_action:
  #     - light.turn_off: blue_status_led
  #   restore_mode: RESTORE_DEFAULT_OFF
        
sensor:
  - platform: adc
    pin: GPIO3
    name: "Battery Voltage"
    update_interval: 60s
    attenuation: 12db

  - platform: uptime
    name: "Uptime seconds"
    id: uptime_sec
    update_interval: 60s
    internal: true
    disabled_by_default: true
    entity_category: diagnostic
    
  - platform: wifi_signal
    name: "WiFi RSSI"
    id: wifi_rssi
    update_interval: 60s
    #internal: true
    disabled_by_default: true
    entity_category: diagnostic

interval:
  - interval: 5s
    then:
      - script.execute: consider_deep_sleep

# 
# Main logic, not a loop.   
#
# Called from successful sensor updates to HA.
# Relies on sensor update timing to act as loop triogger for OTA mode
#
script:
  - id: check_candles_on_off
    mode: queued
    then:
      if:
        condition:
          binary_sensor.is_on: candles_on_off
        then:
          - logger.log: 'candles_on_off: TURN ON candle'
          - switch.turn_on: switch1
        else:
          - logger.log: 'candles_on_off: TURN OFF candle'
          - switch.turn_off: switch1
  - id: consider_deep_sleep
    mode: queued
    then:
      - if:
          # path 1, we dont have connection to HA yet, so just chill for a bit
          condition:
            lambda:  return id(candle_sleep_interval).state.empty();
          then:
            - logger.log: 'Unknown Setting, do nothing..' #will try again after next sensor read in ~5 seconds
          else:
            - script.execute: check_candles_on_off
            - logger.log:
                format: "Entering sleep for %s"
                args: [ 'id(candle_sleep_interval).state' ]
            - deep_sleep.enter: 
                id: deep_sleep1
                sleep_duration: !lambda "return 30000;"
