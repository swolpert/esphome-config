---
wifi:
  # https://esphome.io/components/wifi
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: "${dev_use_address}"
  fast_connect: true
  manual_ip:
    static_ip: ${dev_static_ip}
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
    dns2: 8.8.8.8
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${dev_name} Fallback Hotspot"
    password: !secret wifi_fallback_ap_password

safe_mode:
  disabled: true

captive_portal:
  # no configuration needed
  # https://esphome.io/components/captive_portal.html

# Enable logging
logger:
  # https://esphome.io/components/logger
  # level: INFO
  level: DEBUG
  # level: VERBOSE
  # level: VERY_VERBOSE
  baud_rate: 115200
  hardware_uart: UART0

ota:
  - platform: esphome
    # password: !secret ota_password
# # To remove ota password...
    # password: "c3b63e293c67552afd8603a52199306e"
    # id: ota_id

# Enable Web server.
web_server:
  port: 80
  version: 1
#  auth:
#    username: !secret web_server_username
#    password: !secret web_server_password

