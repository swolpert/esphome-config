script:
  - id: schedule_check_and_next
    mode: queued
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            // Convert current time to seconds since midnight
            int current_seconds = time.hour * 3600 + time.minute * 60 + time.second;

            // Parse on_time and off_time into seconds since midnight
            int on_seconds = -1, off_seconds = -1;
            if (id(on_time) != "none") {
              on_seconds = std::stoi(id(on_time).substr(0, 2)) * 3600 + std::stoi(id(on_time).substr(3, 2)) * 60 + std::stoi(id(on_time).substr(6, 2));
            }
            if (id(off_time) != "none") {
              off_seconds = std::stoi(id(off_time).substr(0, 2)) * 3600 + std::stoi(id(off_time).substr(3, 2)) * 60 + std::stoi(id(off_time).substr(6, 2));
            }

            if (on_seconds != -1 && off_seconds != -1) {
              // Determine whether the light should currently be ON or OFF
              bool light_on = false;
              if (on_seconds < off_seconds) {
                // Normal case: on_time < off_time (e.g., 16:00 to 20:00)
                light_on = (current_seconds >= on_seconds && current_seconds < off_seconds);
              } else {
                // Wrapped case: off_time < on_time (e.g., 20:00 to 16:00)
                light_on = (current_seconds >= on_seconds || current_seconds < off_seconds);
              }

              if (light_on) {
                ESP_LOGI("main", "Turning ON the light");
                id(rgbw_led).turn_on();
              } else {
                ESP_LOGI("main", "Turning OFF the light");
                id(rgbw_led).turn_off();
              }

              // Calculate the next event
              int next_event_seconds = -1;
              if (on_seconds > current_seconds && off_seconds > current_seconds) {
                next_event_seconds = std::min(on_seconds, off_seconds);
              } else if (on_seconds > current_seconds || off_seconds > current_seconds) {
                next_event_seconds = (on_seconds > current_seconds) ? on_seconds : off_seconds;
              } else {
                next_event_seconds = std::min(on_seconds, off_seconds) + 24 * 3600; // Add 24 hours for tomorrow
              }

              // Calculate and log the next event time
              next_event_seconds %= 24 * 3600; // Wrap around in case of overflow
              uint8_t next_event_hrs_clock = next_event_seconds / 3600;
              uint8_t next_event_min_clock = (next_event_seconds % 3600) / 60;
              uint8_t next_event_sec_clock = next_event_seconds % 60;

              ESP_LOGI("main", "Next event time: %02d:%02d:%02d",
                       next_event_hrs_clock, next_event_min_clock, next_event_sec_clock);

              if (next_event_seconds == on_seconds) {
                ESP_LOGI("main", "Next event: Turning ON the light");
              } else if (next_event_seconds == off_seconds) {
                ESP_LOGI("main", "Next event: Turning OFF the light");
              }

                            /*** START RTC CODE ***/
              ESP_LOGI("ds3231", "Setting ds3231 alarm...");
              uint8_t reg_addr;
              uint8_t data[4];

              /** READ ALARM VALUE **/
              reg_addr = 0x07;
              ESP_LOGD("i2c", "I2C device read 0x68 at register 0x%02X...", reg_addr);
              // Read 4 bytes from the device
              if (ds1307_time->read_bytes(reg_addr, data, 4)) {
                ESP_LOGD("ds3231-i2c", "I2C read successful: 0x%02X 0x%02X 0x%02X 0x%02X", data[0], data[1], data[2], data[3]);
              } else {
                ESP_LOGE("ds3231-i2c", "I2C read failed.");
              }

              // Helper function for BCD conversion
              auto decimal_to_bcd = [](uint8_t val) -> uint8_t {
                return ((val / 10) << 4) | (val % 10);
              };

              uint8_t hours_bcd = decimal_to_bcd(next_event_hrs_clock);
              uint8_t minutes_bcd = decimal_to_bcd(next_event_min_clock);
              uint8_t seconds_bcd = decimal_to_bcd(next_event_sec_clock);

              ESP_LOGI("ds3231", "Alarm time: %02d:%02d:%02d", next_event_hrs_clock, next_event_min_clock, next_event_sec_clock);

              /** WRITE ALARM VALUE **/
              reg_addr = 0x07;
              ESP_LOGD("ds3231-i2c", "I2C device write 0x68 at register 0x%02X...", reg_addr);
              data[0] = seconds_bcd & 0x7F;  // A1M1=0: Match exact second
              data[1] = minutes_bcd & 0x7F;  // A1M2=0: Match exact minute
              data[2] = hours_bcd & 0x7F;    // A1M3=0: Match exact hour
              data[3] = 0x80;                // A1M4=1: Match any day
              // Write 4 bytes to device
              if (ds1307_time->write_bytes(reg_addr, data, 4)) {
                ESP_LOGD("ds3231-i2c", "I2C write successful: 0x%02X 0x%02X 0x%02X 0x%02X", data[0], data[1], data[2], data[3]);
              } else {
                ESP_LOGE("ds3231-i2c", "ALARM: I2C write failed.");
              }

              #define NEOSC 0x80 // Bit 7: Enable Oscillator (nEOSC)
              #define BBSQW 0x40 // Bit 6: Battery-Backed Square-Wave Enable (BBSQW)
              #define CONV  0x20 // Bit 5: Convert Temperature (CONV)
              #define RS2   0x10 // Bit 4: Rate Select (RS2)
              #define RS1   0x08 // Bit 3: Rate Select (RS1)
              #define INTCN 0x04 // Bit 2: Interrupt Control (INTCN)
              #define A2IE  0x02 // Bit 1: Alarm 2 Interrupt Enable (A2IE)
              #define A1IE  0x01 // Bit 0: Alarm 1 Interrupt Enable (A1IE)

              /** ENABLE ALARM **/
              reg_addr = 0x0E;
              ESP_LOGD("i2c", "I2C device read 0x68 at register 0x%02X...", reg_addr);
              data[0] = A1IE; // INTCN | A1IE to enable alarm, or only A1IE to enable square wave on alarm
              // Write 1 byte to device
              if (ds1307_time->write_bytes(reg_addr, data, 1)) {
                ESP_LOGD("ds3231-i2c", "ALARM: I2C wrote 0x%02X to address 0x%02X", data, reg_addr);
              } else {
                ESP_LOGE("ds3231-i2c", "I2C write failed at register 0x%02X", reg_addr);
              }

              /** READ ALARM VALUE **/
              reg_addr = 0x07;
              ESP_LOGD("i2c", "I2C device read 0x68 at register 0x%02X...", reg_addr);
              // Read 4 bytes from the device
              if (ds1307_time->read_bytes(reg_addr, data, 4)) {
                ESP_LOGD("ds3231-i2c", "I2C read successful: 0x%02X 0x%02X 0x%02X 0x%02X", data[0], data[1], data[2], data[3]);
              } else {
                ESP_LOGE("ds3231-i2c", "I2C read failed.");
              }

              ESP_LOGI("ds3231", "Alarm set for %02d:%02d:%02d.",
                      next_event_hrs_clock, next_event_min_clock, next_event_sec_clock);
              /*** END RTC CODE ***/


            } else {
              ESP_LOGW("main", "Invalid on_time or off_time");
            }
          } else {
            ESP_LOGW("main", "Invalid current time");
          }

  - id: sntp_callback
    mode: queued
    then:
      - lambda: |-
          char str[30];
          time_t currTime = id(sntp_time).now().timestamp;
          strftime(str, sizeof(str), "%Y-%m-%d %H:%M", localtime(&currTime));
          ESP_LOGI("stefan", "Wrote SNTP time to RTC, curTime: %s", str);

          if (ds1307_time != nullptr) {
            ds1307_time->dump_config();
            ds1307_time->setup(); // setup() basically only does read_rtc_()
            ESP_LOGD("stefan", "DS1307Component setup() called.");
          } else {
            ESP_LOGE("stefan", "DS1307Component is not initialized.");
          }
      # - script.execute: schedule_check_onoff
      # - script.execute: set_ds3231_alarm
      - lambda: |-
          if (ds1307_time != nullptr) {
            ds1307_time->setup(); // setup() basically only does read_rtc_()
            ESP_LOGD("stefan", "DS1307Component setup() called.");
          } else {
            ESP_LOGE("stefan", "DS1307Component is not initialized.");
          }

i2c:
  sda: GPIO4
  scl: GPIO5
  # scan: true
  scan: false
  id: i2c_bus

time:
  - platform: ds1307
    id: ds1307_time
    update_interval: never
    
  - platform: sntp
    id: sntp_time
    timezone: America/New_York
    servers:
     - 192.168.1.1
     - 0.pool.ntp.org
     - 1.pool.ntp.org
    update_interval: never
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        - ds1307.write_time:
            id: ds1307_time
        - lambda: |-
            ESP_LOGI("sntp.on_time_sync", "SNTP sync'ed...");
            char str[30];
            time_t currTime = id(sntp_time).now().timestamp;
            strftime(str, sizeof(str), "%Y-%m-%d %H:%M", localtime(&currTime));
            ESP_LOGI("sntp.on_time_sync", "Current time: %s", str);

            id(done02_sntp) = true;
        

