mqtt:
  broker: 192.168.1.200
  username: !secret mqtt_user
  password: !secret mqtt_password
  discovery: true

  # birth_message: # blank
  # will_message: # blank
  # topic_prefix: "${dev_name}"
  # # IF topic_prefix, all candles will all use the share topic!
  # topic_prefix: "candles"
  log_topic: "${dev_name}/debug"
  # birth_message:
    # topic: ${dev_name}/status
    # payload: online
  # will_message:
    # topic: ${dev_name}/status
    # payload: offline

  on_json_message:
  - topic: "ha/light/candles_rgb_mqtt/schedule"
    then:
      - lambda: |-
          // Log the full incoming JSON message
          std::string json_string;
          serializeJson(x, json_string);  // Use 'x' as the JsonObject
          ESP_LOGD("mqtt", "on_json_message: received ha/light/candles_rgb_mqtt/schedule JSON message: %s", json_string.c_str());

          if (x.containsKey("on_tod") && x.containsKey("off_tod")) {
            std::string new_on_time = x["on_tod"].as<std::string>();
            std::string new_off_time = x["off_tod"].as<std::string>();

            if (new_on_time != id(on_time)) {
              ESP_LOGI("main", "Updating ON time: %s -> %s", id(on_time).c_str(), new_on_time.c_str());
              id(on_time) = new_on_time;
            }

            if (new_off_time != id(off_time)) {
              ESP_LOGI("main", "Updating OFF time: %s -> %s", id(off_time).c_str(), new_off_time.c_str());
              id(off_time) = new_off_time;
            }

            id(done01_mqtt_schedule) = true;
            
          }
          else {
            ESP_LOGW("main", "Invalid schedule format received");
          }
      - script.execute: schedule_check_and_next

  - topic: "candles/led"
    then:
      - lambda: |-
          // Log the full incoming JSON message
          std::string json_string;
          serializeJson(x, json_string);  // Use 'x' as the JsonObject
          ESP_LOGD("mqtt", "on_json_message: received candles/led JSON message: %s", json_string.c_str());

          LightState *lightState = rgbw_led;  // Implicit cast since AddressableLightState is derived from LightState

          LightCall call = lightState->make_call();

          // Create a mutable JsonObject and copy the contents of 'x' (a JsonObjectConst)
          DynamicJsonDocument doc(1024); // Adjust size as needed
          JsonObject obj = doc.to<JsonObject>();
          obj.set(x);  // Set the content of the mutable JsonObject to the content of x

          // Pass the mutable JsonObject to parse_json
          LightJSONSchema::parse_json(*lightState, call, obj);

          call.perform();

          id(latest_light_state) = json_string.c_str();  // Store the latest message in a global variable

  on_message:

  - topic: "candles/sleep_interval"
    then:
      - lambda: |-
          id(sleep_interval) = x.c_str();  // Store the latest message in a global variable
          ESP_LOGD("mqtt", "Received candles/sleep_interval: %s", id(sleep_interval).c_str());  // Log the message

          id(done04_mqtt_sleep_interval) = true;

      # - logger.log: "candles/sleep_interval: consider_deep_sleep"
      # - script.execute: consider_deep_sleep

    # - topic: schedule/light_control
    #   then:
    #     - lambda: |-
    #         auto json = json::parse(x.c_str());
    #         if (json.contains("on_tod") && json.contains("off_tod")) {
    #           std::string new_on_time = json["on_tod"].as<std::string>();
