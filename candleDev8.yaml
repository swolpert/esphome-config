script:
  - id: schedule_when_next
    mode: queued
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            // Convert current time to minutes since midnight
            int current_minutes = time.hour * 60 + time.minute;

            // Parse on_time and off_time into minutes since midnight
            int on_minutes = -1, off_minutes = -1;
            if (id(on_time) != "none") {
              on_minutes = std::stoi(id(on_time).substr(0, 2)) * 60 + std::stoi(id(on_time).substr(3, 2));
            }
            if (id(off_time) != "none") {
              off_minutes = std::stoi(id(off_time).substr(0, 2)) * 60 + std::stoi(id(off_time).substr(3, 2));
            }

            // Initialize next event time
            uint8_t next_event_hours = 0;
            uint8_t next_event_minutes = 0;
            uint8_t next_event_seconds = 0;

            // Determine the next event
            if (on_minutes != -1 && off_minutes != -1) {
              int next_event_minutes = -1;

              if (on_minutes > current_minutes && off_minutes > current_minutes) {
                // Both events are in the future today; pick the earliest
                next_event_minutes = std::min(on_minutes, off_minutes);
              } else if (on_minutes > current_minutes || off_minutes > current_minutes) {
                // One event is in the future today
                next_event_minutes = (on_minutes > current_minutes) ? on_minutes : off_minutes;
              } else {
                // Both events are tomorrow; pick the earliest
                next_event_minutes = std::min(on_minutes, off_minutes);
                next_event_minutes += 24 * 60; // Add 24 hours for the next day
              }

              // Calculate the next event time
              next_event_minutes %= 24 * 60; // Wrap around in case of overflow
              next_event_hours = next_event_minutes / 60;
              next_event_minutes %= 60;
              next_event_seconds = 0;

              // Log the next event
              ESP_LOGI("main", "Next event time: %02d:%02d:%02d",
                       next_event_hours, next_event_minutes, next_event_seconds);

              // Example: Use next event time for further logic
              if (next_event_minutes == on_minutes) {
                ESP_LOGI("main", "Next event: Turning ON the light");
              } else if (next_event_minutes == off_minutes) {
                ESP_LOGI("main", "Next event: Turning OFF the light");
              }
            } else {
              ESP_LOGW("main", "Invalid on_time or off_time");
            }
          } else {
            ESP_LOGW("main", "Invalid current time");
          }


  - id: schedule_check_onoff
    mode: queued
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            // Convert current time to minutes since midnight
            int current_minutes = time.hour * 60 + time.minute;

            // Parse on_time and off_time into minutes since midnight
            int on_minutes = -1, off_minutes = -1;
            if (id(on_time) != "none") {
              on_minutes = std::stoi(id(on_time).substr(0, 2)) * 60 + std::stoi(id(on_time).substr(3, 2));
            }
            if (id(off_time) != "none") {
              off_minutes = std::stoi(id(off_time).substr(0, 2)) * 60 + std::stoi(id(off_time).substr(3, 2));
            }

            // Determine the state based on the time ranges
            if (on_minutes != -1 && off_minutes != -1) {
              if (on_minutes < off_minutes) {
                // Normal case: on_time < off_time (e.g., 16:00 to 20:00)
                if (current_minutes >= on_minutes && current_minutes < off_minutes) {
                  ESP_LOGI("main", "Turning ON the light");
                  id(rgbw_led).turn_on();
                } else {
                  ESP_LOGI("main", "Turning OFF the light");
                  id(rgbw_led).turn_off();
                }
              } else {
                // Wrapped case: off_time < on_time (e.g., 20:00 to 16:00)
                if (current_minutes >= on_minutes || current_minutes < off_minutes) {
                  ESP_LOGI("main", "Turning ON the light");
                  id(rgbw_led).turn_on();
                } else {
                  ESP_LOGI("main", "Turning OFF the light");
                  id(rgbw_led).turn_off();
                }
              }
            } else {
              ESP_LOGW("main", "Invalid on_time or off_time");
            }
          } else {
            ESP_LOGW("main", "Invalid current time");
          }

script:
  - id: schedule_check_and_next
    mode: queued
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            // Convert current time to minutes since midnight
            int current_minutes = time.hour * 60 + time.minute;

            // Parse on_time and off_time into minutes since midnight
            int on_minutes = -1, off_minutes = -1;
            if (id(on_time) != "none") {
              on_minutes = std::stoi(id(on_time).substr(0, 2)) * 60 + std::stoi(id(on_time).substr(3, 2));
            }
            if (id(off_time) != "none") {
              off_minutes = std::stoi(id(off_time).substr(0, 2)) * 60 + std::stoi(id(off_time).substr(3, 2));
            }

            if (on_minutes != -1 && off_minutes != -1) {
              // Determine whether the light should currently be ON or OFF
              bool light_on = false;
              if (on_minutes < off_minutes) {
                // Normal case: on_time < off_time (e.g., 16:00 to 20:00)
                light_on = (current_minutes >= on_minutes && current_minutes < off_minutes);
              } else {
                // Wrapped case: off_time < on_time (e.g., 20:00 to 16:00)
                light_on = (current_minutes >= on_minutes || current_minutes < off_minutes);
              }

              if (light_on) {
                ESP_LOGI("main", "Turning ON the light");
                id(rgbw_led).turn_on();
              } else {
                ESP_LOGI("main", "Turning OFF the light");
                id(rgbw_led).turn_off();
              }

              // Calculate the next event
              int next_event_minutes = -1;
              if (on_minutes > current_minutes && off_minutes > current_minutes) {
                next_event_minutes = std::min(on_minutes, off_minutes);
              } else if (on_minutes > current_minutes || off_minutes > current_minutes) {
                next_event_minutes = (on_minutes > current_minutes) ? on_minutes : off_minutes;
              } else {
                next_event_minutes = std::min(on_minutes, off_minutes) + 24 * 60; // Add 24 hours for tomorrow
              }

              // Calculate and log the next event time
              next_event_minutes %= 24 * 60; // Wrap around in case of overflow
              uint8_t next_event_hours = next_event_minutes / 60;
              uint8_t next_event_minutes_remaining = next_event_minutes % 60;
              uint8_t next_event_seconds = 0;

              ESP_LOGI("main", "Next event time: %02d:%02d:%02d",
                       next_event_hours, next_event_minutes_remaining, next_event_seconds);

              if (next_event_minutes == on_minutes) {
                ESP_LOGI("main", "Next event: Turning ON the light");
              } else if (next_event_minutes == off_minutes) {
                ESP_LOGI("main", "Next event: Turning OFF the light");
              }
            } else {
              ESP_LOGW("main", "Invalid on_time or off_time");
            }
          } else {
            ESP_LOGW("main", "Invalid current time");
          }



  - id: sntp_callback
    mode: queued
    then:
      - lambda: |-
          char str[30];
          time_t currTime = id(sntp_time).now().timestamp;
          strftime(str, sizeof(str), "%Y-%m-%d %H:%M", localtime(&currTime));
          ESP_LOGI("stefan", "Wrote SNTP time to RTC, curTime: %s", str);

          if (ds1307_time != nullptr) {
            ds1307_time->dump_config();
            ds1307_time->setup(); // setup() basically only does read_rtc_()
            ESP_LOGD("stefan", "DS1307Component setup() called.");
          } else {
            ESP_LOGE("stefan", "DS1307Component is not initialized.");
          }
      - script.execute: schedule_check_onoff
      - script.execute: set_ds3231_alarm
      - lambda: |-
          if (ds1307_time != nullptr) {
            ds1307_time->setup(); // setup() basically only does read_rtc_()
            ESP_LOGD("stefan", "DS1307Component setup() called.");
          } else {
            ESP_LOGE("stefan", "DS1307Component is not initialized.");
          }

  - id: set_ds3231_alarm
    mode: queued
    then:
      - logger.log: "Setting ds3231 alarm..."
      - lambda: |-
          // Helper function for BCD conversion
          auto decimal_to_bcd = [](uint8_t val) -> uint8_t {
            return ((val / 10) << 4) | (val % 10);
          };

          // Choose between sunset or alarm time
          bool use_mqtt_time = false;  // Set to 'true' to use sunset time, 'false' to use alarm time
          ESPTime alarm_time = {0};
          char str[30];

          // Get the sunset time
          auto sunset = id(sunset_time).state;
          if (sunset.empty()) {
            ESP_LOGW("Sun", "Sunset time is unavailable.");
            return;
          }

          struct tm t = {};
          if (!strptime(sunset.c_str(), "%H:%M:%S", &t)) {
            ESP_LOGW("Sun", "Failed to parse sunset time: %s", sunset.c_str());
            return;
          }

          // Convert to ESPTime
          time_t dummy_time = 0;  // The second argument can be ignored for our purpose
          alarm_time = ESPTime::from_c_tm(&t, dummy_time);

          uint8_t reg_addr;
          uint8_t data[4];

          reg_addr = 0x07;
          ESP_LOGD("ds3231", "I2C device 0x68 at register 0x%02X...", reg_addr);
          // Read 4 bytes from the device
          if (ds1307_time->read_bytes(reg_addr, data, 4)) {
            ESP_LOGD("ds3231", "I2C read successful: 0x%02X 0x%02X 0x%02X 0x%02X", data[0], data[1], data[2], data[3]);
          } else {
            ESP_LOGE("ds3231", "I2C read failed.");
          }

          uint8_t seconds_bcd = decimal_to_bcd(alarm_time.second);
          uint8_t minutes_bcd = decimal_to_bcd(alarm_time.minute);
          uint8_t hours_bcd = decimal_to_bcd(alarm_time.hour);

          ESP_LOGI("ds3231", "Alarm time: %02d:%02d:%02d", alarm_time.hour, alarm_time.minute, alarm_time.second);

          /** Write ALARM date-time **/
          reg_addr = 0x07;
          ESP_LOGD("ds3231", "I2C device 0x68 at register 0x%02X...", reg_addr);
          data[0] = seconds_bcd & 0x7F;  // A1M1=0: Match exact second
          data[1] = minutes_bcd & 0x7F;  // A1M2=0: Match exact minute
          data[2] = hours_bcd & 0x7F;    // A1M3=0: Match exact hour
          data[3] = 0x80;                // A1M4=1: Match any day
          // Write 4 bytes to device
          if (ds1307_time->write_bytes(reg_addr, data, 4)) {
            ESP_LOGD("ds3231", "I2C read successful: 0x%02X 0x%02X 0x%02X 0x%02X", data[0], data[1], data[2], data[3]);
          } else {
            ESP_LOGE("ds3231", "ALARM: I2C write failed.");
          }

          #define NEOSC 0x80 // Bit 7: Enable Oscillator (nEOSC)
          #define BBSQW 0x40 // Bit 6: Battery-Backed Square-Wave Enable (BBSQW)
          #define CONV  0x20 // Bit 5: Convert Temperature (CONV)
          #define RS2   0x10 // Bit 4: Rate Select (RS2)
          #define RS1   0x08 // Bit 3: Rate Select (RS1)
          #define INTCN 0x04 // Bit 2: Interrupt Control (INTCN)
          #define A2IE  0x02 // Bit 1: Alarm 2 Interrupt Enable (A2IE)
          #define A1IE  0x01 // Bit 0: Alarm 1 Interrupt Enable (A1IE)

          /** ENABLE ALARM **/
          reg_addr = 0x0E;
          ESP_LOGD("ds3231", "I2C device 0x68 at register 0x%02X...", reg_addr);
          data[0] = A1IE; // INTCN | A1IE to enable alarm, or only A1IE to enable square wave on alarm
          // Write 1 byte to device
          if (ds1307_time->write_bytes(reg_addr, data, 1)) {
            ESP_LOGD("ds3231", "ALARM: I2C wrote 0x%02X to address 0x%02X", data, reg_addr);
          } else {
            ESP_LOGE("ds3231", "ALARM: I2C write failed.");
          }

          ESP_LOGI("ds3231", "Alarm set for %02d:%02d:%02d.",
                  alarm_time.hour, alarm_time.minute, alarm_time.second);

  - id: consider_deep_sleep
    mode: queued
    then:
      - logger.log: "Running consider_deep_sleep..."
      - lambda: |-
          ESP_LOGD("stefan", "light_mqtt_value: %s",         id(latest_light_state).c_str() );
          ESP_LOGD("stefan", "done04_mqtt_sleep_interval: %d", id(done04_mqtt_sleep_interval)   );
          ESP_LOGD("stefan", "done02_sntp: %d",          id(done02_sntp)            );
          if ( id(latest_light_state).c_str()!="none" && id(done04_mqtt_sleep_interval) && id(done02_sntp) ) {
            ESP_LOGD("stefan", "*** consider_deep_sleep is TRUE!  ***");
            //if ( strncmp( id(sleep_interval).state.c_str(), "always on", 9) == 0 ) {
            if ( strncmp( id(sleep_interval).c_str(), "always on", 9) == 0 ) {
              id(deep_sleep1).prevent_deep_sleep();
              ESP_LOGD("stefan", "sleep_interval is always on (for OTA)");
            }
            else {
              //const char *time_str = id(sleep_interval).state.c_str();
              const char *time_str = id(sleep_interval).c_str();
              uint32_t value = 0;
              char unit = '\0';
              // ESP_LOGD("stefan", "sleep_duration string: %s", *time_str );

              // Skip leading spaces
              while (*time_str && isspace(*time_str)) {
                  time_str++;
              }

              // Extract numeric value
              while (*time_str != '\0' && isdigit(*time_str)) {
                  value = value * 10 + (*time_str - '0');
                  time_str++;
              }

              // Skip any spaces between the number and unit
              while (*time_str && isspace(*time_str)) {
                  time_str++;
              }

              // Extract the first letter of the unit (h for hours, m for minutes, s for seconds)
              if (*time_str != '\0') {
                  // unit = tolower(*time_str);  // Convert to lowercase to handle case insensitivity
                  unit = *time_str;  // Convert to lowercase to handle case insensitivity
              }

              // If no valid unit was found, return an error value (-1)
              if (unit == '\0') {
                  value = 0;  // Invalid format
              }

              ESP_LOGD("stefan", "unit character: %c", unit );
              // Convert the time based on the unit
              switch (unit) {
                  case 'h':  // hours
                  case 'H':
                      value *= 3600;  // 1 hour = 3600 seconds
                      break;  // don't fall-through
                  case 'm':  // minutes
                  case 'M':
                      value *= 60;   // 1 minute = 60 seconds
                      break;
                  case 's':  // seconds
                  case 'S':
                      value = value;  // already in seconds
                      break;
                  default:
                      value = 0;
                      break;
              }

              ESP_LOGD("stefan", "parsed sleep_duration of %d seconds", value );
              if (value > 0) {
                ESP_LOGD("stefan", "debug_gpio turned OFF");
                id(debug_gpio).turn_off();
                
                id(deep_sleep1).allow_deep_sleep();
                id(deep_sleep1).set_run_duration(0);
                id(deep_sleep1).set_sleep_duration(value * 1000);
                id(deep_sleep1).begin_sleep();
              }
            }
          }
          else {
            ESP_LOGD("stefan", "*** consider_deep_sleep is FALSE! ***");
          }

i2c:
  sda: GPIO4
  scl: GPIO5
  # scan: true
  scan: false
  id: i2c_bus

time:
  - platform: ds1307
    id: ds1307_time
    update_interval: never
    
  - platform: sntp
    id: sntp_time
    timezone: America/New_York
    servers:
     - 192.168.1.1
     - 0.pool.ntp.org
     - 1.pool.ntp.org
    update_interval: never
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        - ds1307.write_time:
            id: ds1307_time
        - lambda: |-
            ESP_LOGI("sntp.on_time_sync", "SNTP sync'ed...");
            char str[30];
            time_t currTime = id(sntp_time).now().timestamp;
            strftime(str, sizeof(str), "%Y-%m-%d %H:%M", localtime(&currTime));
            ESP_LOGI("sntp.on_time_sync", strftime(0, 0, id(font), "%Y-%m-%d %H:%M", id(sntp_time).now()));

            id(done02_sntp) = true;
        

