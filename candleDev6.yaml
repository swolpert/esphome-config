---

#
#  Trick #1 - dynamic sleep duration
#  
#  Since startup, wifi, sensor, and HA sync take anywhere from 2 seconds to 12.
#  So to achieve a 60s or 600s loop we dynamically adjust how long to sleep
#
globals:
  # - id: delay_int
    # type: int
    # restore_value: no
    # initial_value: '99999'

  - id: mqtt_done_switch
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: adc_done_switch
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: mqtt_done_sleep_interval
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: latest_light_state
    type: std::string
    restore_value: no
    initial_value: '"none"'
    
  - id: sleep_interval
    type: std::string
    restore_value: no
    initial_value: '"none"'

esphome:
  name: ${dev_name}
  friendly_name: ${dev_friendly_name}
  
  on_boot:
    - priority: 700
      then: 
        - output.turn_on: debug_gpio
        - logger.log: "debug_gpio turned ON"
        # - deep_sleep.prevent: deep_sleep1

    - priority: 599 # after setup_priority::DATA = 600.0f
      then:
        - lambda: |-
            uint8_t reg_addr = 0x0E;
            uint8_t data = 0xFF;

            // ESP_LOGD("ds3231", "I2C device 0x68 at register 0x%02X...", reg_addr);

            // // Read 1 byte from the device
            // if (ds1307_time->read_bytes(reg_addr, &data, 1)) {
            //   ESP_LOGD("ds3231", "I2C read successful: 0x%02X", data);
            // } else {
            //   ESP_LOGE("ds3231", "I2C read failed.");
            // }

            #define NEOSC 0x80 // Bit 7: Enable Oscillator (nEOSC)
            #define BBSQW 0x40 // Bit 6: Battery-Backed Square-Wave Enable (BBSQW)
            #define CONV  0x20 // Bit 5: Convert Temperature (CONV)
            #define RS2   0x10 // Bit 4: Rate Select (RS2)
            #define RS1   0x08 // Bit 3: Rate Select (RS1)
            #define INTCN 0x04 // Bit 2: Interrupt Control (INTCN)
            #define A2IE  0x02 // Bit 1: Alarm 2 Interrupt Enable (A2IE)
            #define A1IE  0x01 // Bit 0: Alarm 1 Interrupt Enable (A1IE)

            ESP_LOGD("ds3231", "Writing to I2C device 0x68 at register 0x%02X...", reg_addr);
            data = INTCN; // INTCN | A1IE to enable alarm, or only A1IE to enable square wave on alarm
            // Read 1 byte from the device
            if (ds1307_time->write_bytes(reg_addr, &data, 1)) {
              ESP_LOGD("ds3231", "I2C wrote 0x%02X to address 0x%02X", data, reg_addr);
              ESP_LOGI("ds3231", "DS3231 alarm bit(s): Cleared");
            } else {
              ESP_LOGE("ds3231", "DS3231 alarm bit(s): I2C write failed.");
            }

    - priority: -100
      then:
        - logger.log: "on_boot: waiting for WiFi..."
        - wait_until:  
            condition:      #  any condition here
              wifi.connected:
            timeout: 10s
        - logger.log: "on_boot: WiFi connected! (or timed out)"
        - lambda: |-
            if (sntp_time != nullptr) {
              sntp_time->update();
              ESP_LOGI("on_boot", "SNTPComponent update called.");
            } else {
              ESP_LOGE("on_boot", "SNTPComponent is not initialized.");
            }
        # - logger.log: "on_boot: ds1307.read_time"
        # - ds1307.read_time:
        #     id: ds1307_time
        - component.update: adc_batt_voltage
        - logger.log: "on_boot: consider_deep_sleep..."
        - script.execute: consider_deep_sleep

# # To remove ota password...
